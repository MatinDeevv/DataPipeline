schema_version: "1.0.0"
dataset_name: "xau_m1_nonhuman"
version: "1.0.0"
description: "Phase 4 machine-native XAUUSD M1 dataset over a wider synchronized range, built from stable public selectors only."
symbols:
  - "XAUUSD"
date_from: "2024-02-26"
date_to: "2024-03-01"
base_clock: "M1"
state_version_ref: "state.default@1.0.0"
feature_selectors:
  - "time/*"
  - "session/*"
  - "quality/*"
  - "htf_context/*"
  - "disagreement/*"
  - "event_shape/*"
  - "entropy/*"
  - "multiscale/*"
label_pack_ref: "core_tb_volscaled@1.0.0"
filters:
  - "exclude:filled_rows"
split_policy: "temporal_holdout"
train_ratio: 0.70
val_ratio: 0.15
test_ratio: 0.15
embargo_rows: 240
truth_policy_ref: "truth.default@1.0.0"
publish_on_accept: true
tags:
  - "phase4-checkpoint"
  - "xau"
  - "nonhuman"
