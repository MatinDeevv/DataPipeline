schema_version: "1.0.0"
dataset_name: "xau_m1_nonhuman"
version: "1.0.0"
description: "Phase 3 machine-native XAUUSD M1 dataset. Stable core families are compiler-materialized; disagreement/event_shape/entropy families are expected to resolve from registered feature artifacts."
symbols:
  - "XAUUSD"
date_from: "2026-01-20"
date_to: "2026-01-23"
base_clock: "M1"
state_version_ref: "state.default@1.0.0"
feature_selectors:
  - "time/*"
  - "session/*"
  - "quality/*"
  - "htf_context/*"
  - "disagreement/*"
  - "event_shape/*"
  - "entropy/*"
feature_artifact_refs:
  - "feature.disagreement.state_disagreement.latest"
  - "feature.event_shape.event_shape.latest"
  - "feature.entropy.micro_entropy.latest"
label_pack_ref: "core_tb_volscaled@1.0.0"
filters:
  - "exclude:filled_rows"
split_policy: "temporal_holdout"
train_ratio: 0.70
val_ratio: 0.15
test_ratio: 0.15
embargo_rows: 240
truth_policy_ref: "truth.default@1.0.0"
publish_on_accept: true
tags:
  - "phase3"
  - "xau"
  - "nonhuman"
